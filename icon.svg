<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3b54"/>
      <stop offset="0.45" stop-color="#8a4f4a"/>
      <stop offset="0.78" stop-color="#f2a65a"/>
      <stop offset="1" stop-color="#f7c98b"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f4e4a"/>
      <stop offset="1" stop-color="#0e2826"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#sky)"/>
  <circle cx="356" cy="150" r="46" fill="#ffe7b0" opacity="0.9"/>
  <rect y="300" width="512" height="212" fill="url(#water)"/>
  <!-- cypress silhouette -->
  <path d="M70 300 q-18 -40 -6 -78 q18 26 22 -2 q-16 -34 -2 -64 q16 30 20 -2 q4 32 20 2 q14 30 -2 64 q4 28 22 2 q12 38 -6 78 z" fill="#0c1f1d" transform="translate(0,-2)"/>
  <!-- fishing line -->
  <line x1="470" y1="40" x2="276" y2="330" stroke="#f2e8d5" stroke-width="3" opacity="0.5"/>
  <!-- bobber -->
  <g transform="translate(276,330)">
    <ellipse cx="0" cy="64" rx="70" ry="14" fill="#0a1a16" opacity="0.5"/>
    <circle cx="0" cy="0" r="46" fill="#f2e8d5"/>
    <path d="M -46 0 a 46 46 0 0 1 92 0 z" fill="#d8553f"/>
    <circle cx="0" cy="0" r="9" fill="#2a2a2a"/>
  </g>
  <!-- ripples -->
  <ellipse cx="276" cy="396" rx="60" ry="12" fill="none" stroke="#f2e8d5" stroke-width="2.5" opacity="0.35"/>
  <ellipse cx="276" cy="396" rx="100" ry="20" fill="none" stroke="#f2e8d5" stroke-width="2" opacity="0.18"/>
</svg>
